# credit_risk_env.yml

channels:
  - conda-forge
dependencies:
  # --- Core Environment (PINNED to match training) ---
  # Flexible minor version: allows 3.12.x (not 3.13+)
  - python=3.12.*

  # --- Core ML & Data Handling ---
  - pandas>=2.2.2
  - numpy>=2.0.2
  - scipy>=1.15.2
  - psutil>=5.9.5
  # Flexible minor version: allows 1.6.x (not 1.7+)
  - scikit-learn=1.6.*
  
  # --- Model Management (PINNED to match model artifacts) ---
  # Flexible minor version: allows 2.22.x
  - mlflow=2.22.*

  # --- API & Web ---
  - fastapi
  - uvicorn[standard]
  - streamlit
  - plotly
  - jinja2
  - anyio
  - pydantic

  # --- Model Interpretation ---
  - matplotlib
  - shap

  # --- Development & Testing ---
  - pytest
  - httpx
  - black
  - flake8
