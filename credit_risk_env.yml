# credit_risk_env.yml

channels:
  - conda-forge
dependencies:
  # --- Core Environment (PINNED to match training) ---
  - python=3.12.11

  # --- Core ML & Data Handling ---
  - pandas>=2.2.2
  - numpy>=2.0.2
  - scipy>=1.15.2
  - psutil>=5.9.5
  - scikit-learn=1.6.1
  
  # --- Model Management (PINNED to match model artifacts) ---
  - mlflow=2.22.2

  # --- API & Web ---
  - fastapi
  - uvicorn[standard]
  - streamlit
  - plotly
  - jinja2
  - anyio
  - pydantic

  # --- Model Interpretation ---
  - matplotlib
  - shap

  # --- Development & Testing ---
  - pytest
  - httpx
  - black
  - flake8
